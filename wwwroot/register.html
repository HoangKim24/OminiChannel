<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | KP Luxury</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            margin: 10rem auto;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: #222;
            border: 1px solid #444;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-gold);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-card">
            <h2 class="brand-font" style="color: var(--accent-gold); margin-bottom: 2rem; font-size: 2rem;">KP REGISTER
            </h2>
            <form id="registerForm">
                <input type="text" id="username" placeholder="Tên đăng nhập" required>
                <input type="password" id="password" placeholder="Mật khẩu" required>
                <button type="submit" class="btn-gold" style="width: 100%;">Tạo tài khoản</button>
            </form>
            <p style="margin-top: 1.5rem; color: #888;">Đã có tài khoản? <a href="login.html"
                    style="color: var(--accent-gold);">Đăng nhập</a></p>
            <p id="error" style="color: #ff4444; margin-top: 1rem;"></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                await auth.register(u, p);
                alert('Đăng ký thành công! Hãy đăng nhập.');
                window.location.href = 'login.html';
            } catch (err) {
                document.getElementById('error').innerText = err.message;
            }
        };
    </script>
</body>

</html>
